/* ============ HELPERS ============ */
const iso = (d = new Date()) => d.toISOString().slice(0, 10);
const mondayIdx = (d) => (d.getDay() + 6) % 7;
const weekStart = (d = new Date()) => { const x = new Date(d); x.setDate(x.getDate() - mondayIdx(x)); return x; };
const haptic = (ms = 15) => { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} };
const parseRepRange = (r) => { const m = /^(\d+)(?:-(\d+))?$/.exec((r || "").trim()); return m ? [+m[1], +(m[2] || m[1])] : null; };

function suggestion(entries, repStr) {
  if (!entries || !entries.length) return { txt: "Primera vez: usa el peso orientativo", tone: "n" };
  const last = entries[entries.length - 1];
  const range = parseRepRange(repStr || last.target);
  if (last.rir === 0 || (range && last.reps > 0 && last.reps < range[0])) return { txt: "Baja un poco el peso o revisa la técnica", tone: "down" };
  if (last.rir >= 2 && (!range || last.reps >= range[1])) return { txt: "Sube el peso mínimo posible", tone: "up" };
  return { txt: "Mantén el peso esta semana", tone: "keep" };
}

function Ring({ pct, size = 104, stroke = 10, children }) {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size / 2} cy={size / 2} r={r} stroke="#27272a" strokeWidth={stroke} fill="none" />
        <circle cx={size / 2} cy={size / 2} r={r} stroke="#a3e635" strokeWidth={stroke} fill="none" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c * (1 - Math.min(1, Math.max(0, pct)))} style={{ transition: "stroke-dashoffset .5s cubic-bezier(.2,.8,.2,1)" }} />
      </svg>
      <div className="absolute inset-0 flex items-center justify-center">{children}</div>
    </div>
  );
}

function Confetti() {
  const pieces = useMemo(() => Array.from({ length: 36 }, (_, i) => ({
    l: Math.random() * 100, d: 1.5 + Math.random() * 1.4, delay: Math.random() * .5,
    c: ["#a3e635", "#22d3ee", "#fff", "#84cc16"][i % 4], s: 6 + Math.random() * 8,
  })), []);
  return (
    <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
      {pieces.map((p, i) => (
        <div key={i} style={{ left: p.l + "%", width: p.s, height: p.s * 0.5, background: p.c, animation: `conf ${p.d}s ${p.delay}s linear forwards`, position: "absolute", top: 0, borderRadius: 2 }} />
      ))}
    </div>
  );
}

/* Gráficas SVG propias (sin librerías) */
function MiniLine({ data }) {
  const w = 320, h = 150, pad = 26;
  const vals = data.map(x => x.kg);
  const min = Math.min(...vals) - 0.5, max = Math.max(...vals) + 0.5;
  const X = i => pad + (i * (w - pad * 2)) / Math.max(1, data.length - 1);
  const Y = v => h - pad - ((v - min) / (max - min)) * (h - pad * 2);
  const pts = data.map((x, i) => `${X(i)},${Y(x.kg)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full">
      <polyline points={pts} fill="none" stroke="#a3e635" strokeWidth="2.5" strokeLinejoin="round" />
      {data.map((x, i) => <circle key={i} cx={X(i)} cy={Y(x.kg)} r="3.5" fill="#a3e635" />)}
      <text x={pad} y={h - 8} fill="#71717a" fontSize="9">{data[0].d}</text>
      <text x={w - pad} y={h - 8} fill="#71717a" fontSize="9" textAnchor="end">{data[data.length - 1].d}</text>
      <text x={X(data.length - 1)} y={Y(vals[vals.length - 1]) - 9} fill="#fff" fontSize="11" fontWeight="bold" textAnchor="end">{vals[vals.length - 1]} kg</text>
    </svg>
  );
}
function MiniBars({ data }) {
  const w = 320, h = 130, pad = 16;
  const max = Math.max(...data.map(x => x.n), 1);
  const bw = (w - pad * 2) / data.length;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full">
      {data.map((x, i) => {
        const bh = (x.n / max) * (h - 40);
        return (
          <g key={i}>
            <rect x={pad + i * bw + bw * 0.15} y={h - 24 - bh} width={bw * 0.7} height={Math.max(2, bh)} rx="4" fill="#22d3ee" />
            <text x={pad + i * bw + bw / 2} y={h - 29 - bh} fill="#fff" fontSize="10" fontWeight="bold" textAnchor="middle">{x.n}</text>
            <text x={pad + i * bw + bw / 2} y={h - 9} fill="#71717a" fontSize="8" textAnchor="middle">{x.d}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ============ REGISTRO MANUAL POR EJERCICIO ============ */
function ExerciseRow({ ex, state, setState, loggable }) {
  const [open, setOpen] = useState(false);
  const hist = state.logs[ex.n] || [];
  const last = hist[hist.length - 1];
  const [w, setW] = useState("");
  const [reps, setReps] = useState("");
  const [rir, setRir] = useState(ex.rir != null ? ex.rir : 2);

  useEffect(() => { if (open) { setW(last ? String(last.w) : ""); setReps(last && last.reps ? String(last.reps) : ""); setRir(last ? last.rir : (ex.rir != null ? ex.rir : 2)); } }, [open]);

  const save = () => {
    haptic(25);
    const entry = { d: iso(), w: parseFloat(w) || 0, reps: parseInt(reps) || 0, rir, target: ex.r };
    setState(s => ({ ...s, logs: { ...s.logs, [ex.n]: [...(s.logs[ex.n] || []), entry] } }));
    setOpen(false);
  };

  const sug = last ? suggestion(hist, ex.r) : null;

  return (
    <div className="border-b border-zinc-800/60 pb-2.5 last:border-0 last:pb-0">
      <div className="flex items-start justify-between gap-3">
        <div className="min-w-0">
          <div className="text-sm font-semibold text-zinc-200">{ex.n}</div>
          <div className="text-xs text-zinc-500 mt-0.5">
            {ex.s > 1 ? `${ex.s} × ` : ""}{ex.r}{ex.rir !== undefined ? ` · RIR ${ex.rir}` : ""}{ex.rest ? ` · ${ex.rest} s` : ""}
          </div>
          {ex.p && <div className="text-xs text-cyan-300 mt-0.5">{ex.p}</div>}
          {last && (
            <div className="text-xs mt-1">
              <span className="text-lime-400 font-bold">{last.w} kg</span>
              <span className="text-zinc-500">{last.reps ? ` × ${last.reps}` : ""} · RIR {last.rir} · {last.d}</span>
              {sug && sug.tone !== "n" && <span className={`ml-1 font-bold ${sug.tone === "up" ? "text-lime-400" : sug.tone === "down" ? "text-orange-400" : "text-cyan-300"}`}>→ {sug.txt}</span>}
            </div>
          )}
        </div>
        {loggable && (
          <button onClick={() => { haptic(); setOpen(o => !o); }} className={`shrink-0 p-2.5 rounded-xl ${open ? "bg-lime-400 text-zinc-950" : "bg-zinc-800 text-zinc-400"}`}>
            <Pencil size={14} />
          </button>
        )}
      </div>
      {open && (
        <div className="mt-3 bg-zinc-950 rounded-2xl p-4 rise">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-zinc-500 font-semibold">Peso (kg)</label>
              <div className="flex items-center gap-1.5 mt-1.5">
                <button onClick={() => setW(String(Math.max(0, (parseFloat(w) || 0) - 2.5)))} className="bg-zinc-800 p-2 rounded-lg text-white"><MinusI size={14} /></button>
                <input inputMode="decimal" value={w} onChange={e => setW(e.target.value)} className="w-full bg-zinc-900 text-white text-center font-bold rounded-lg py-2 border border-zinc-800 outline-none focus:border-lime-400 text-sm" placeholder="0" />
                <button onClick={() => setW(String((parseFloat(w) || 0) + 2.5))} className="bg-zinc-800 p-2 rounded-lg text-white"><PlusI size={14} /></button>
              </div>
            </div>
            <div>
              <label className="text-xs text-zinc-500 font-semibold">Reps hechas</label>
              <input inputMode="numeric" value={reps} onChange={e => setReps(e.target.value)} className="w-full mt-1.5 bg-zinc-900 text-white text-center font-bold rounded-lg py-2 border border-zinc-800 outline-none focus:border-lime-400 text-sm" placeholder={ex.r} />
            </div>
          </div>
          <label className="text-xs text-zinc-500 font-semibold block mt-3">RIR real</label>
          <div className="flex gap-1.5 mt-1.5">
            {[0, 1, 2, 3, 4].map(v => (
              <button key={v} onClick={() => { haptic(); setRir(v); }} className={`flex-1 py-2 rounded-lg font-bold text-xs ${rir === v ? "bg-lime-400 text-zinc-950" : "bg-zinc-800 text-zinc-400"}`}>{v}{v === 4 ? "+" : ""}</button>
            ))}
          </div>
          <button onClick={save} className="w-full mt-3 bg-lime-400 text-zinc-950 font-black py-2.5 rounded-xl text-sm flex items-center justify-center gap-1.5 active:scale-95 transition-transform">
            <CheckI size={15} /> Guardar
          </button>
        </div>
      )}
    </div>
  );
}

function WorkoutDetail({ workout, onClose, state, setState }) {

  );

              setState(s => ({
                ...s,
                waist: waist ? [...s.waist.filter(x => x.d !== iso()), { d: iso(), cm: parseFloat(waist) }] : s.waist,
                checkins: [...s.checkins.filter(c => c.d !== iso()), { d: iso(), energia, hambre, pasos: parseInt(pasos) || 0 }],
              })); setWaist(""); setPasos("");
            }} className="w-full mt-4 bg-zinc-800 text-lime-400 font-bold py-3 rounded-2xl text-sm">Guardar check-in</button>
            {state.waist.length > 0 && <div className="text-xs text-zinc-500 mt-3">Última cintura: <b className="text-white">{state.waist[state.waist.length - 1].cm} cm</b> ({state.waist[state.waist.length - 1].d})</div>}
          </Card>
        </div>
      ) : (
        <div className="space-y-3 mt-4">
          {exNames.length === 0 && <Card className="p-6 text-zinc-500 text-sm">Aún no hay registros. Abre un entrenamiento y apunta tus pesos con el lápiz: aquí verás tu histórico, tu mejor marca y la sugerencia para la próxima vez.</Card>}
          {exNames.map(n => {
            const hist = state.logs[n]; const last = hist[hist.length - 1];
            const best = Math.max(...hist.map(h => h.w));
            const sug = suggestion(hist, last.target);
            return (
              <Card key={n} className="p-4">
                <div className="flex items-center justify-between">
                  <div className="font-bold text-white text-sm">{n}</div>
                  <div className="text-xs text-zinc-500 flex items-center gap-1"><Trophy size={12} className="text-yellow-400" /> {best} kg</div>
                </div>
                <div className="text-xs text-zinc-500 mt-1.5">
                  {hist.slice(-4).map((h, i) => <span key={i} className="mr-2"><span className="text-zinc-300">{h.w}kg{h.reps ? "×" + h.reps : ""}</span> <span className="text-zinc-600">RIR{h.rir} · {h.d.slice(5)}</span></span>)}
                </div>
                <div className={`text-xs font-bold mt-1.5 ${sug.tone === "up" ? "text-lime-400" : sug.tone === "down" ? "text-orange-400" : "text-cyan-300"}`}>→ {sug.txt}</div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Profile({ state, setState }) {
  const p = state.profile;
  const [show, setShow] = useState(null);
  const upd = (k, v) => setState(s => ({ ...s, profile: { ...s.profile, [k]: v } }));
  const Field = ({ label, k, type = "text" }) => (
    <div>
      <label className="text-xs text-zinc-500 font-semibold">{label}</label>
      <input type={type} defaultValue={p[k]} onBlur={e => upd(k, type === "number" ? +e.target.value : e.target.value)} className="w-full mt-1 bg-zinc-950 text-white rounded-xl px-3 py-2.5 border border-zinc-800 text-sm outline-none focus:border-lime-400" />
    </div>
  );
  return (
    <div className="p-5 rise space-y-4">
      <H>Perfil</H>
      <Card className="p-5">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Altura (cm)" k="altura" type="number" />
          <Field label="Peso (kg)" k="peso" type="number" />
          <Field label="Días disponibles / semana" k="dias" type="number" />
          <Field label="Preferencia de intensidad" k="intensidad" />
        </div>
        <div className="mt-3 space-y-3">
          <Field label="Objetivo" k="objetivo" />
          <Field label="Material disponible" k="material" />
          <Field label="Lesiones o molestias" k="lesiones" />
        </div>
        <div className="text-xs text-zinc-600 mt-3">Los cambios se guardan al salir de cada campo.</div>
      </Card>
      <Card className="p-5" onClick={() => setShow("rir")}>
        <div className="flex items-center justify-between"><div className="font-black text-white flex items-center gap-2"><InfoI size={16} className="text-cyan-300" /> ¿Qué es el RIR?</div><ChevronRight className="text-zinc-600" size={18} /></div>
      </Card>
      <Card className="p-5" onClick={() => setShow("principios")}>
        <div className="flex items-center justify-between"><div className="font-black text-white flex items-center gap-2"><Zap size={16} className="text-lime-400" /> Principios del programa</div><ChevronRight className="text-zinc-600" size={18} /></div>
      </Card>
      {show && (
        <div className="fixed inset-0 z-40 bg-zinc-950/90 backdrop-blur flex items-end" onClick={() => setShow(null)}>
          <div className="w-full max-w-md mx-auto bg-zinc-900 rounded-t-3xl p-6 max-h-[80vh] overflow-y-auto rise" onClick={e => e.stopPropagation()}>
            {show === "rir" ? <React.Fragment>
              <h3 className="text-xl font-black text-white">RIR: repeticiones en reserva</h3>
              <div className="space-y-3 mt-4 text-sm text-zinc-300">
                <p><b className="text-lime-400">RIR 2</b> = terminas la serie pudiendo hacer <b>2 repeticiones más</b> con buena técnica.</p>
                <p>• Si podrías hacer <b>5 más</b>, el peso es <b className="text-cyan-300">bajo</b>: súbelo.</p>
                <p>• Si <b>no llegas</b> a las reps objetivo, el peso es <b className="text-orange-400">alto</b>: bájalo.</p>
                <p>• En ejercicios técnicos como el <b>peso muerto rumano</b>, nunca fuerces al fallo.</p>
                <p className="text-zinc-500">La app te sugiere automáticamente subir, mantener o bajar peso según tus registros (doble progresión).</p>
              </div>
            </React.Fragment> : <React.Fragment>
              <h3 className="text-xl font-black text-white">Principios del programa</h3>
              <div className="space-y-2.5 mt-4">{PRINCIPLES.map((pr, i) => <div key={i} className="text-sm text-zinc-300 flex gap-2"><span className="text-lime-400 font-black">{i + 1}.</span> {pr}</div>)}</div>
            </React.Fragment>}
            <button onClick={() => setShow(null)} className="w-full mt-6 bg-lime-400 text-zinc-950 font-bold py-3.5 rounded-2xl">Entendido</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============ APP ============ */
function App() {
  const [state, setState] = useState(() => store.get() || INITIAL);
  const [tab, setTab] = useState("inicio");
  const [detail, setDetail] = useState(null);

  useEffect(() => { store.set(state); }, [state]);

  const openWorkout = (w) => { haptic(); setDetail(w); };

  const TABS = [
    ["inicio", "Inicio", HomeI], ["semana", "Semana", CalendarDays], ["biblio", "Entrenos", Dumbbell], ["progreso", "Progreso", TrendingUp], ["perfil", "Perfil", UserI],
  ];

  return (
    <div className="min-h-screen bg-zinc-950 text-white max-w-md mx-auto relative" style={{ fontFamily: "ui-sans-serif, system-ui, -apple-system, sans-serif" }}>
      <div className="pb-24">
        {tab === "inicio" && <Dashboard state={state} setState={setState} openWorkout={openWorkout} />}
        {tab === "semana" && <CalendarScreen state={state} setState={setState} openWorkout={openWorkout} />}
        {tab === "biblio" && <Library openWorkout={openWorkout} />}
        {tab === "progreso" && <Progress state={state} setState={setState} />}
        {tab === "perfil" && <Profile state={state} setState={setState} />}
      </div>
      <div className="fixed bottom-0 inset-x-0 max-w-md mx-auto bg-zinc-900/90 backdrop-blur border-t border-zinc-800 flex justify-around py-2 pb-4 z-20">
        {TABS.map(([k, l, IconC]) => (
          <button key={k} onClick={() => { haptic(); setTab(k); }} className={`flex flex-col items-center gap-0.5 px-3 py-1 ${tab === k ? "text-lime-400" : "text-zinc-500"}`}>
            <IconC size={20} /><span className="text-[10px] font-bold">{l}</span>
          </button>
        ))}
      </div>
      {detail && <WorkoutDetail workout={detail} state={state} setState={setState} onClose={() => setDetail(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
