<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#09090b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>FitTrack · Entrenamiento funcional</title>
<style>
  :root{
    --bg:#09090b; --card:#18181b; --card2:#000; --line:#27272a; --line2:#3f3f46;
    --txt:#fff; --mut:#a1a1aa; --mut2:#71717a; --lime:#a3e635; --cyan:#22d3ee; --orange:#fb923c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);overscroll-behavior-y:none;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  #app{max-width:460px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:88px}
  h1,h2,h3{margin:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .p5{padding:20px}
  .eyebrow{color:var(--lime);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
  .h{font-size:26px;font-weight:900;letter-spacing:-.02em}
  .card{background:var(--card);border:1px solid var(--line);border-radius:24px}
  .card.tap:active{transform:scale(.97)}
  .card,.btn,.chip,.tab,.navbtn{transition:transform .12s ease, background .15s ease, color .15s ease}
  .chip{display:inline-block;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--line);color:var(--mut)}
  .chip.on{background:var(--lime);color:#09090b}
  .mut{color:var(--mut2)}
  .row{display:flex;align-items:center}
  .btn-lime{background:var(--lime);color:#09090b;font-weight:900;border-radius:16px;padding:14px;width:100%;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-lime:active{transform:scale(.96)}
  .btn-ghost{background:var(--line);color:var(--lime);font-weight:700;border-radius:16px;padding:12px;width:100%}
  input.fld{width:100%;background:var(--bg);color:#fff;border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;font-size:14px;outline:none}
  input.fld:focus{border-color:var(--lime)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .space>*{margin-top:16px}
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;background:rgba(24,24,27,.92);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;justify-content:space-around;
    padding:8px 0 16px;z-index:20}
  .navbtn{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--mut2);font-size:10px;font-weight:700;padding:4px 10px}
  .navbtn.act{color:var(--lime)}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px}
  .seg button{flex:1;padding:8px;border-radius:999px;font-size:12px;font-weight:700;color:var(--mut)}
  .seg button.on{background:var(--lime);color:#09090b}
  .sheet-bg{position:fixed;inset:0;background:rgba(9,9,11,.9);backdrop-filter:blur(6px);z-index:40;display:flex;align-items:flex-end}
  .sheet{width:100%;max-width:460px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;padding:24px;max-height:82vh;overflow-y:auto}
  .overlay{position:fixed;inset:0;background:var(--bg);z-index:30;overflow-y:auto}
  .exline{border-bottom:1px solid rgba(63,63,70,.5);padding-bottom:10px}
  .exline:last-child{border-bottom:none;padding-bottom:0}
  .daycell{width:44px;height:44px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900}
  .rise{animation:rise .4s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes conf{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .scrollx{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
  .stepper{display:flex;align-items:center;gap:6px}
  .stepper button{background:var(--line);border-radius:10px;padding:8px 10px;color:#fff;font-weight:900;line-height:1}
  .pill{flex:1;padding:8px 0;border-radius:10px;font-weight:800;font-size:12px;background:var(--line);color:var(--mut);text-align:center}
  .pill.on{background:var(--lime);color:#09090b}
  @media (prefers-reduced-motion: reduce){.rise{animation:none}}
</style>
</head>

/* ================= HELPERS ================= */
function iso(d){d=d||new Date();return d.toISOString().slice(0,10)}
function mondayIdx(d){return (d.getDay()+6)%7}
function weekStart(d){d=d||new Date();var x=new Date(d);x.setDate(x.getDate()-mondayIdx(x));return x}
function haptic(ms){try{navigator.vibrate&&navigator.vibrate(ms||15)}catch(e){}}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}
function parseRepRange(r){var m=/^(\d+)(?:-(\d+))?$/.exec((r||"").trim());return m?[+m[1],+(m[2]||m[1])]:null}
function findW(id){for(var i=0;i<WORKOUTS.length;i++)if(WORKOUTS[i].id===id)return WORKOUTS[i];return null}

function suggestion(entries,repStr){
  if(!entries||!entries.length)return{txt:"Primera vez: usa el peso orientativo",tone:"n"};
  var last=entries[entries.length-1];
  var range=parseRepRange(repStr||last.target);
  if(last.rir===0||(range&&last.reps>0&&last.reps<range[0]))return{txt:"Baja un poco el peso o revisa la técnica",tone:"down"};
  if(last.rir>=2&&(!range||last.reps>=range[1]))return{txt:"Sube el peso mínimo posible",tone:"up"};
  return{txt:"Mantén el peso esta semana",tone:"keep"};
}
function toneColor(t){return t==="up"?"var(--lime)":t==="down"?"var(--orange)":"var(--cyan)"}

/* ================= COMPONENTES ================= */
function ring(pct,val,goal){
  var size=104,stroke=10,r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-Math.min(1,Math.max(0,pct)));
  return '<div style="position:relative;width:'+size+'px;height:'+size+'px">'+
    '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)">'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="#27272a" stroke-width="'+stroke+'" fill="none"/>'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="#a3e635" stroke-width="'+stroke+'" fill="none" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset .5s"/>'+
    '</svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px">'+val+'<span style="color:var(--mut2);font-size:15px">/'+goal+'</span></div></div>';
}
function miniLine(data){
  var w=320,h=150,pad=26,vals=data.map(function(x){return x.kg});
  var min=Math.min.apply(null,vals)-.5,max=Math.max.apply(null,vals)+.5;
  function X(i){return pad+(i*(w-pad*2))/Math.max(1,data.length-1)}
  function Y(v){return h-pad-((v-min)/(max-min||1))*(h-pad*2)}
  var pts=data.map(function(x,i){return X(i)+","+Y(x.kg)}).join(" ");
  var dots=data.map(function(x,i){return '<circle cx="'+X(i)+'" cy="'+Y(x.kg)+'" r="3.5" fill="#a3e635"/>'}).join("");
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%"><polyline points="'+pts+'" fill="none" stroke="#a3e635" stroke-width="2.5" stroke-linejoin="round"/>'+dots+
   '<text x="'+pad+'" y="'+(h-8)+'" fill="#71717a" font-size="9">'+esc(data[0].d)+'</text>'+
   '<text x="'+(w-pad)+'" y="'+(h-8)+'" fill="#71717a" font-size="9" text-anchor="end">'+esc(data[data.length-1].d)+'</text>'+
   '<text x="'+X(data.length-1)+'" y="'+(Y(vals[vals.length-1])-9)+'" fill="#fff" font-size="11" font-weight="bold" text-anchor="end">'+vals[vals.length-1]+' kg</text></svg>';
}
function miniBars(data){
  var w=320,h=130,pad=16,max=Math.max.apply(null,data.map(function(x){return x.n}).concat([1])),bw=(w-pad*2)/data.length,out="";
  data.forEach(function(x,i){var bh=(x.n/max)*(h-40);
    out+='<rect x="'+(pad+i*bw+bw*.15)+'" y="'+(h-24-bh)+'" width="'+(bw*.7)+'" height="'+Math.max(2,bh)+'" rx="4" fill="#22d3ee"/>'+
    '<text x="'+(pad+i*bw+bw/2)+'" y="'+(h-29-bh)+'" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">'+x.n+'</text>'+
    '<text x="'+(pad+i*bw+bw/2)+'" y="'+(h-9)+'" fill="#71717a" font-size="8" text-anchor="middle">'+esc(x.d)+'</text>';});
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%">'+out+'</svg>';
}

      (sug.tone!=="n"?' <span style="font-weight:700;color:'+toneColor(sug.tone)+'">→ '+esc(sug.txt)+'</span>':'')+'</div>';}
  var pencil=loggable?'<button data-editex="'+bi+'|'+ei+'" class="stepper" style="border-radius:12px;padding:9px;'+(UI.openEx===bi+"|"+ei?'background:var(--lime);color:#09090b':'background:var(--line);color:var(--mut)')+'">'+icon("pencil",14,UI.openEx===bi+"|"+ei?"#09090b":"#a1a1aa")+'</button>':'';
  var editor="";
  if(UI.openEx===bi+"|"+ei){
    var pv=last?last.w:"",pr=last&&last.reps?last.reps:"",prir=(last?last.rir:(e.rir!=null?e.rir:2));

    var pills="";for(var v=0;v<=4;v++)pills+='<button data-setrir="'+v+'" class="pill '+(UI.editRir===v?'on':'')+'">'+v+(v===4?"+":"")+'</button>';
    editor='<div class="card p5" style="background:var(--bg);border-radius:16px;padding:16px;margin-top:12px" class="rise">'+
      '<div class="grid2" style="gap:12px"><div><label class="mut" style="font-size:12px;font-weight:600">Peso (kg)</label>'+
      '<div class="stepper" style="margin-top:6px"><button data-wstep="-1">'+icon("minus",14)+'</button>'+
      '<input id="exW" class="fld" style="text-align:center;font-weight:900" inputmode="decimal" value="'+esc(pv)+'" placeholder="0"/>'+
      '<button data-wstep="1">'+icon("plus",14)+'</button></div></div>'+
      '<div><label class="mut" style="font-size:12px;font-weight:600">Reps hechas</label>'+
      '<input id="exR" class="fld" style="margin-top:6px;text-align:center;font-weight:900" inputmode="numeric" value="'+esc(pr)+'" placeholder="'+esc(e.r)+'"/></div></div>'+
      '<label class="mut" style="font-size:12px;font-weight:600;display:block;margin-top:12px">RIR real</label>'+
      '<div class="row" style="gap:6px;margin-top:6px">'+pills+'</div>'+
      '<button data-saveex="'+e.n+'|'+e.r+'" class="btn-lime" style="margin-top:12px;padding:10px">'+icon("check",15,"#09090b")+' Guardar</button></div>';
  }
  return '<div class="exline"><div class="row" style="justify-content:space-between;gap:12px;align-items:flex-start">'+
    '<div style="min-width:0"><div style="font-size:14px;font-weight:600;color:#e4e4e7">'+esc(e.n)+'</div>'+
    '<div class="mut" style="font-size:12px;margin-top:2px">'+esc(meta)+'</div>'+
    (e.p?'<div style="font-size:12px;color:var(--cyan);margin-top:2px">'+esc(e.p)+'</div>':'')+lastLine+'</div>'+pencil+'</div>'+editor+'</div>';
}

/* ================= SHEETS ================= */
function renderSheet(){
  if(UI.picker!=null){
    var opts='<button data-assign="'+UI.picker+'|__rest" style="width:100%;text-align:left;padding:16px;background:var(--bg);border-radius:16px;color:var(--mut2);font-weight:600;font-size:14px">Descanso</button>';
    opts+=WORKOUTS.map(function(w){return '<button data-assign="'+UI.picker+'|'+w.id+'" style="width:100%;text-align:left;padding:16px;background:var(--bg);border-radius:16px;border:1px solid var(--line);margin-top:8px">'+
      '<div style="font-weight:700;font-size:14px">'+esc(w.name)+'</div><div class="mut" style="font-size:12px">'+w.dur+' · '+w.int+'/10 · '+w.tag+'</div></button>'}).join("");
    return '<div class="sheet-bg" data-closesheet="1"><div class="sheet rise" data-stop="1"><div style="font-weight:900;font-size:18px">'+DAYS_FULL[UI.picker]+'</div><div style="margin-top:12px">'+opts+'</div></div></div>';
  }
  if(UI.sheet==="rir"){
    return '<div class="sheet-bg" data-closesheet="1"><div class="sheet rise" data-stop="1">'+
      '<h3 style="font-size:20px;font-weight:900">RIR: repeticiones en reserva</h3>'+
      '<div style="margin-top:16px;font-size:14px;color:#d4d4d8;line-height:1.5">'+
      '<p><b style="color:var(--lime)">RIR 2</b> = terminas la serie pudiendo hacer <b>2 repeticiones más</b> con buena técnica.</p>'+
      '<p>• Si podrías hacer <b>5 más</b>, el peso es <b style="color:var(--cyan)">bajo</b>: súbelo.</p>'+
      '<p>• Si <b>no llegas</b> a las reps objetivo, el peso es <b style="color:var(--orange)">alto</b>: bájalo.</p>'+
      '<p>• En ejercicios técnicos como el <b>peso muerto rumano</b>, nunca fuerces al fallo.</p>'+
      '<p class="mut">La app te sugiere subir, mantener o bajar peso según tus registros (doble progresión).</p></div>'+
      '<button data-closesheet="1" class="btn-lime" style="margin-top:24px">Entendido</button></div></div>';
  }
  if(UI.sheet==="principios"){
    return '<div class="sheet-bg" data-closesheet="1"><div class="sheet rise" data-stop="1">'+
      '<h3 style="font-size:20px;font-weight:900">Principios del programa</h3><div style="margin-top:16px">'+
      PRINCIPLES.map(function(pr,i){return '<div style="font-size:14px;color:#d4d4d8;margin-top:10px;display:flex;gap:8px"><span style="color:var(--lime);font-weight:900">'+(i+1)+'.</span> '+esc(pr)+'</div>'}).join("")+'</div>'+
      '<button data-closesheet="1" class="btn-lime" style="margin-top:24px">Entendido</button></div></div>';
  }
  return "";
}

/* ================= CONFETI ================= */
function confetti(){
  var box=document.createElement("div");box.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden";
  var cols=["#a3e635","#22d3ee","#fff","#84cc16"];
  for(var i=0;i<36;i++){var p=document.createElement("div");var s=6+Math.random()*8;
    p.style.cssText="position:absolute;top:0;left:"+(Math.random()*100)+"%;width:"+s+"px;height:"+(s*.5)+"px;border-radius:2px;background:"+cols[i%4]+";animation:conf "+(1.5+Math.random()*1.4)+"s "+(Math.random()*.5)+"s linear forwards";
    box.appendChild(p);}
  document.body.appendChild(box);setTimeout(function(){box.remove()},2600);
}

/* ================= RENDER PRINCIPAL ================= */
function render(){
  var body;
  if(UI.tab==="inicio")body=screenInicio();
  else if(UI.tab==="semana")body=screenSemana();
  else if(UI.tab==="biblio")body=screenBiblio();
  else if(UI.tab==="progreso")body=screenProgreso();
  else body=screenPerfil();

  var tabs=[["inicio","Inicio","home"],["semana","Semana","cal"],["biblio","Entrenos","dumbbell"],["progreso","Progreso","trend"],["perfil","Perfil","user"]];
  var nav='<div class="nav">'+tabs.map(function(t){return '<button class="navbtn '+(UI.tab===t[0]?'act':'')+'" data-tab="'+t[0]+'">'+icon(t[2],20)+'<span>'+t[1]+'</span></button>'}).join("")+'</div>';

  var html=body+nav;
  if(UI.detail)html+=renderDetail();
  html+=renderSheet();
  document.getElementById("app").innerHTML=html;
}

/* ================= EVENTOS ================= */
document.addEventListener("click",function(ev){
  var el=ev.target.closest("[data-tab],[data-open],[data-closedetail],[data-picker],[data-assign],[data-toggledone],[data-caloff],[data-calview],[data-filter],[data-progtab],[data-sheet],[data-closesheet],[data-markdone],[data-editex],[data-setrir],[data-wstep],[data-saveex],[data-savebody],[data-savecheckin],[data-rate],[data-stop]");
  if(!el)return;
  var d=el.dataset;

  if(d.stop!==undefined && !Object.keys(d).some(function(k){return k!=="stop"})){ev.stopPropagation();return;}
  if(d.tab){haptic();UI.tab=d.tab;UI.detail=null;UI._filter=UI._filter;render();return;}
  if(d.open){haptic();UI.detail=d.open;UI.openEx=null;window.scrollTo(0,0);render();return;}
  if(d.closedetail){haptic();UI.detail=null;UI.openEx=null;render();return;}
  if(d.caloff){UI.calOffset+=parseInt(d.caloff);render();return;}
  if(d.calview){UI.calView=d.calview;render();return;}
  if(d.filter){haptic();UI._filter=d.filter;render();return;}
  if(d.progtab){UI.progTab=d.progtab;render();return;}
  if(d.picker!=null&&d.picker!==""){UI.picker=parseInt(d.picker);render();return;}
  if(d.sheet){UI.sheet=d.sheet;render();return;}
  if(d.closesheet!==undefined){UI.picker=null;UI.sheet=null;render();return;}

  if(d.assign){var parts=d.assign.split("|");haptic();var idx=parseInt(parts[0]);
    if(parts[1]==="__rest")delete S.schedule[idx];else S.schedule[idx]=parts[1];
    UI.picker=null;persist();render();return;}
  if(d.toggledone){var t=d.toggledone.split("|");haptic(30);
    if(S.completed[t[0]])delete S.completed[t[0]];else S.completed[t[0]]=t[1];persist();render();return;}
  if(d.markdone){haptic(80);var was=S.completed[iso()]===d.markdone;
    if(was)delete S.completed[iso()];else S.completed[iso()]=d.markdone;
    persist();render();if(!was)confetti();return;}

  if(d.editex){haptic();UI.openEx=UI.openEx===d.editex?null:d.editex;UI.editRir=null;render();return;}
  if(d.setrir!==undefined){haptic();UI.editRir=parseInt(d.setrir);render();return;}
  if(d.wstep){var inp=document.getElementById("exW");var cur=parseFloat(inp.value)||0;
    cur=d.wstep==="1"?cur+2.5:Math.max(0,cur-2.5);inp.value=cur;return;}
  if(d.saveex){var sp=d.saveex.split("|");var name=sp[0];var target=sp[1];
    var w=parseFloat(document.getElementById("exW").value)||0;
    var reps=parseInt(document.getElementById("exR").value)||0;
    var rir=UI.editRir!=null?UI.editRir:2;
    haptic(25);if(!S.logs[name])S.logs[name]=[];
    S.logs[name].push({d:iso(),w:w,reps:reps,rir:rir,target:target});
    UI.openEx=null;persist();render();return;}

  if(d.savebody){var bi=document.getElementById("bodyInput");var v=parseFloat(bi.value);
    if(v){haptic();S.body=S.body.filter(function(b){return b.d!==iso()});S.body.push({d:iso(),kg:v});persist();render();}return;}
  if(d.rate){var rp=d.rate.split("|");if(rp[0]==="ciEnergia")UI._energia=parseInt(rp[1]);else UI._hambre=parseInt(rp[1]);render();return;}
  if(d.savecheckin){haptic();
    var waist=parseFloat((document.getElementById("ciWaist")||{}).value);
    var pasos=parseInt((document.getElementById("ciPasos")||{}).value)||0;
    if(waist){S.waist=S.waist.filter(function(x){return x.d!==iso()});S.waist.push({d:iso(),cm:waist})}
    S.checkins=S.checkins.filter(function(c){return c.d!==iso()});
    S.checkins.push({d:iso(),energia:UI._energia||3,hambre:UI._hambre||3,pasos:pasos});
    persist();render();return;}
});

/* cerrar sheet al tocar el fondo */
document.addEventListener("click",function(ev){
  var bg=ev.target.closest(".sheet-bg");
  if(bg&&!ev.target.closest(".sheet")){UI.picker=null;UI.sheet=null;render();}
},true);

/* guardar perfil al editar */
document.addEventListener("input",function(ev){
  var el=ev.target.closest("[data-profile]");if(!el)return;
  var k=el.dataset.profile;var v=el.type==="number"?(+el.value):el.value;
  S.profile[k]=v;persist();
});

render();
</script>
</body>
</html>
